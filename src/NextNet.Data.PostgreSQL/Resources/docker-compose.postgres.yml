# docker-compose.postgres.yml — generated by `nextnet db init postgres --docker`
# Start: docker compose -f docker-compose.postgres.yml up -d
# Stop:  docker compose -f docker-compose.postgres.yml down
#
# ⚠️  SECURITY WARNING: The default credentials below are for local development only.
#     Change POSTGRES_USER and POSTGRES_PASSWORD before deploying to production.

services:
  postgres:
    image: postgres:16-alpine
    container_name: nextnet-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: {{ProjectName}}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
