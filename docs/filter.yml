### DocFX API Filter
### Excludes internal/private APIs from the generated reference

apiRules:
- include:
    uidRegex: ^NextNet\.
    type: Type
- include:
    uidRegex: ^NextNet\..*
    type: Method
- include:
    uidRegex: ^NextNet\..*
    type: Property
- exclude:
    uidRegex: ^NextNet\.Internal\.
    type: Type
- exclude:
    uidRegex: ^NextNet\.(Src|Tests)\.
    type: Type
- exclude:
    uidRegex: \.Tests\.
    type: Type
- exclude:
    uidRegex: ^System\.
    type: Type
- exclude:
    uidRegex: ^Microsoft\.
    type: Type
- exclude:
    uidRegex: \.DebuggerDisplay$
    type: Property
- exclude:
    uidRegex: \.GetEnumerator$
    type: Method
- exclude:
    uidRegex: \.Dispose$
    type: Method
- exclude:
    uidRegex: \.ctor$
    type: Method
- exclude:
    uidRegex: ^AutoGeneratedProgram$
    type: Type

attributeRules:
- exclude:
    uidRegex: ^System\.ComponentModel\.EditorBrowsableAttribute$
- exclude:
    uidRegex: ^System\.Runtime\.CompilerServices\.
- exclude:
    uidRegex: ^System\.Diagnostics\.Debugger
